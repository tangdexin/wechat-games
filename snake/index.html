<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .header {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0,0,0,0.3);
        }
        
        .score-box {
            text-align: center;
            color: #fff;
        }
        
        .score-label { font-size: 12px; color: rgba(255,255,255,0.6); }
        .score-value { font-size: 24px; font-weight: bold; color: #00ff88; }
        
        #gameCanvas {
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            background: rgba(0,0,0,0.5);
        }
        
        .start-screen, .over-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.85);
            z-index: 100;
        }
        
        .start-screen.hidden, .over-screen.hidden { display: none; }
        
        .title { font-size: 48px; margin-bottom: 20px; }
        .score-text { font-size: 36px; color: #ffd700; margin-bottom: 30px; }
        
        .btn {
            padding: 15px 50px;
            font-size: 18px;
            background: linear-gradient(135deg, #00ff88, #00b4db);
            border: none;
            border-radius: 30px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
        }
        
        .controls {
            position: absolute;
            bottom: 30px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
        }
        
        .ctrl-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 15px;
            font-size: 24px;
            color: #fff;
        }
        
        .ctrl-btn:active { background: rgba(0,255,136,0.5); }
    </style>
</head>
<body>
    <div class="header">
        <div class="score-box">
            <div class="score-label">得分</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">最高</div>
            <div class="score-value" id="best">0</div>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="320" height="400"></canvas>
    
    <div class="start-screen" id="startScreen">
        <div class="title">🐍 贪吃蛇</div>
        <button class="btn" onclick="startGame()">开始游戏</button>
    </div>
    
    <div class="over-screen hidden" id="overScreen">
        <div class="title">游戏结束</div>
        <div class="score-text" id="finalScore">0</div>
        <button class="btn" onclick="startGame()">再来一次</button>
    </div>
    
    <div class="controls">
        <div></div>
        <button class="ctrl-btn" onclick="changeDir('up')">⬆️</button>
        <div></div>
        <button class="ctrl-btn" onclick="changeDir('left')">⬅️</button>
        <button class="ctrl-btn" onclick="changeDir('down')">⬇️</button>
        <button class="ctrl-btn" onclick="changeDir('right')">➡️</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;
        
        let snake, food, direction, score, bestScore, gameLoop;
        bestScore = localStorage.getItem('snakeBest') || 0;
        document.getElementById('best').textContent = bestScore;
        
        function init() {
            snake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
            direction = 'right';
            score = 0;
            spawnFood();
            document.getElementById('score').textContent = 0;
        }
        
        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * COLS),
                y: Math.floor(Math.random() * ROWS)
            };
            // 确保不生成在蛇身上
            for (let s of snake) {
                if (s.x === food.x && s.y === food.y) {
                    spawnFood();
                    break;
                }
            }
        }
        
        function update() {
            const head = {x: snake[0].x, y: snake[0].y};
            
            if (direction === 'up') head.y--;
            if (direction === 'down') head.y++;
            if (direction === 'left') head.x--;
            if (direction === 'right') head.x++;
            
            // 撞墙
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }
            
            // 撞自己
            for (let s of snake) {
                if (head.x === s.x && head.y === s.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 食物
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 2, 0, Math.PI*2);
            ctx.fill();
            
            // 蛇
            snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? '#00ff88' : '#00cc6a';
                ctx.shadowColor = ctx.fillStyle;
                ctx.shadowBlur = i === 0 ? 15 : 5;
                ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
            });
            ctx.shadowBlur = 0;
        }
        
        function changeDir(dir) {
            const opposites = {up: 'down', down: 'up', left: 'right', right: 'left'};
            if (opposites[dir] !== direction) direction = dir;
        }
        
        function gameLoop() {
            update();
            draw();
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('snakeBest', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
        }
        
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('overScreen').classList.add('hidden');
            init();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameLoop, 150);
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('overScreen').classList.remove('hidden');
        }
        
        // 键盘控制
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') changeDir('up');
            if (e.key === 'ArrowDown') changeDir('down');
            if (e.key === 'ArrowLeft') changeDir('left');
            if (e.key === 'ArrowRight') changeDir('right');
        });
        
        init();
        draw();
    </script>
</body>
</html>
