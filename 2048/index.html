<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 - 微信版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        body {
            background: #faf8ef;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .header {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .title {
            font-size: 40px;
            font-weight: bold;
            color: #776e65;
        }
        
        .score-box {
            background: #bbada0;
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
        }
        
        .score-label {
            color: #eee4da;
            font-size: 12px;
        }
        
        .score-value {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }
        
        .game-container {
            width: 320px;
            height: 420px;
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            position: relative;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
        }
        
        .cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: #776e65;
            transition: all 0.1s;
        }
        
        .tile {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            transition: all 0.15s ease-in-out;
        }
        
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; }
        .tile-16 { background: #f59563; }
        .tile-32 { background: #f67c5f; }
        .tile-64 { background: #f65e3b; }
        .tile-128 { background: #edcf72; font-size: 24px; }
        .tile-256 { background: #edcc61; font-size: 24px; }
        .tile-512 { background: #edc850; font-size: 24px; }
        .tile-1024 { background: #edc53f; font-size: 18px; }
        .tile-2048 { background: #edc22e; font-size: 18px; }
        
        .new-game-btn {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            padding: 15px;
            background: #8f7a66;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        
        .over-text {
            font-size: 40px;
            font-weight: bold;
            color: #776e65;
        }
        
        .restart-btn {
            margin-top: 20px;
            padding: 15px 30px;
            background: #8f7a66;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">2048</div>
        <div class="score-box">
            <div class="score-label">得分</div>
            <div class="score-value" id="score">0</div>
        </div>
    </div>
    
    <div class="game-container">
        <div class="grid">
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>
        <div id="tilesContainer"></div>
        <div class="over-overlay" id="overOverlay">
            <div class="over-text">游戏结束!</div>
            <button class="restart-btn" onclick="restartGame()">再来一局</button>
        </div>
    </div>
    
    <button class="new-game-btn" onclick="initGame()">新游戏</button>

    <script>
        const GRID_SIZE = 4;
        const CELL_SIZE = 70;
        const GAP = 10;
        
        let grid = [];
        let score = 0;
        let gameOver = false;
        
        function initGame() {
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            score = 0;
            gameOver = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('overOverlay').style.display = 'none';
            
            addRandomTile();
            addRandomTile();
            renderGrid();
        }
        
        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }
        
        function renderGrid() {
            const container = document.getElementById('tilesContainer');
            container.innerHTML = '';
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = 'tile tile-' + grid[r][c];
                        tile.textContent = grid[r][c];
                        tile.style.left = (c * (CELL_SIZE + GAP) + 10) + 'px';
                        tile.style.top = (r * (CELL_SIZE + GAP) + 10) + 'px';
                        container.appendChild(tile);
                    }
                }
            }
        }
        
        function move(direction) {
            if (gameOver) return;
            
            let moved = false;
            
            const rotate = (n) => {
                const result = Array(n).fill().map(() => Array(n).fill(0));
                for (let r = 0; r < n; r++) {
                    for (let c = 0; c < n; c++) {
                        result[c][n - 1 - r] = grid[r][c];
                    }
                }
                return result;
            };
            
            const slide = (row) => {
                let arr = row.filter(x => x !== 0);
                for (let i = 0; i < arr.length - 1; i++) {
                    if (arr[i] === arr[i + 1]) {
                        arr[i] *= 2;
                        score += arr[i];
                        arr.splice(i + 1, 1);
                    }
                }
                while (arr.length < GRID_SIZE) arr.push(0);
                return arr;
            };
            
            // 旋转使方向统一
            let rotations = 0;
            if (direction === 'left') rotations = 0;
            if (direction === 'up') rotations = 1;
            if (direction === 'right') rotations = 2;
            if (direction === 'down') rotations = 3;
            
            for (let i = 0; i < rotations; i++) {
                grid = rotate(grid);
            }
            
            // 移动
            const newGrid = grid.map(row => slide(row));
            
            for (let i = 0; i < (4 - rotations); i++) {
                newGrid = rotate(newGrid);
            }
            
            if (JSON.stringify(grid) !== JSON.stringify(newGrid)) {
                moved = true;
                grid = newGrid;
                addRandomTile();
                renderGrid();
                document.getElementById('score').textContent = score;
                
                if (isGameOver()) {
                    gameOver = true;
                    document.getElementById('overOverlay').style.display = 'flex';
                }
            }
        }
        
        function isGameOver() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === 0) return false;
                    if (c < GRID_SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
                    if (r < GRID_SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
                }
            }
            return true;
        }
        
        function restartGame() {
            initGame();
        }
        
        // 触摸滑动
        let startX, startY;
        document.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const dx = endX - startX;
            const dy = endY - startY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) {
                    move(dx > 0 ? 'right' : 'left');
                }
            } else {
                if (Math.abs(dy) > 30) {
                    move(dy > 0 ? 'down' : 'up');
                }
            }
        });
        
        // 键盘
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
        });
        
        initGame();
    </script>
</body>
</html>
