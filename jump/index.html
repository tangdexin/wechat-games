<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐰 跳一跳 - 微信版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        /* 游戏画布 */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* 开始界面 */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .title {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 60px;
        }
        
        .start-btn {
            width: 200px;
            height: 50px;
            background: linear-gradient(135deg, #07c160, #06ad56);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(7,193,96,0.4);
        }
        
        /* 分数显示 */
        #scoreDisplay {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 60px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
        }
        
        /* 结束界面 */
        #endScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
        }
        
        .end-score {
            color: #07c160;
            font-size: 50px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .end-title {
            color: #fff;
            font-size: 24px;
            margin-bottom: 40px;
        }
        
        .btn-group {
            display: flex;
            gap: 20px;
        }
        
        .restart-btn {
            width: 140px;
            height: 45px;
            background: #07c160;
            border: none;
            border-radius: 22px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }
        
        .share-btn {
            width: 140px;
            height: 45px;
            background: #fff;
            border: none;
            border-radius: 22px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: bold;
        }
        
        /* 音效按钮 */
        .sound-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            font-size: 20px;
            z-index: 101;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="scoreDisplay">0</div>
    <button class="sound-btn" id="soundBtn">🔊</button>
    
    <div id="startScreen">
        <div class="logo">🐰</div>
        <div class="title">跳一跳</div>
        <div class="subtitle">按住屏幕蓄力，松开跳跃</div>
        <button class="start-btn" onclick="startGame()">开始游戏</button>
    </div>
    
    <div id="endScreen">
        <div class="end-score" id="finalScore">0</div>
        <div class="end-title" id="endTitle">完美!</div>
        <div class="btn-group">
            <button class="restart-btn" onclick="restartGame()">再玩一次</button>
            <button class="share-btn" onclick="shareScore()">炫耀一下</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 适配屏幕
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let highScore = 0;
        
        // 玩家
        const player = {
            x: 0,
            y: 0,
            radius: 20,
            color: '#07c160',
            vx: 0,
            vy: 0,
            isJumping: false,
            power: 0,
            maxPower: 100
        };
        
        // 平台
        let platforms = [];
        
        // 蓄力相关
        let isPressing = false;
        let power = 0;
        let powerDirection = 1;
        
        // 平台样式
        const platformColors = ['#07c160', '#1a1a2e', '#e74c3c', '#3498db', '#9b59b6', '#f39c12'];
        
        // 初始化平台
        function initPlatforms() {
            platforms = [];
            const startX = canvas.width / 2;
            const startY = canvas.height - 200;
            
            // 起始平台
            platforms.push({
                x: startX,
                y: startY,
                width: 80,
                height: 15,
                color: '#07c160'
            });
            
            // 生成后续平台
            for (let i = 0; i < 10; i++) {
                addPlatform();
            }
        }
        
        function addPlatform() {
            const last = platforms[platforms.length - 1];
            const minDist = 80;
            const maxDist = 200;
            const dist = minDist + Math.random() * (maxDist - minDist);
            
            // 随机角度（左右）
            const angle = (Math.random() - 0.5) * Math.PI * 0.6;
            
            const newX = last.x + Math.sin(angle) * dist;
            const newY = last.y - Math.cos(angle) * dist * 0.8;
            
            platforms.push({
                x: newX,
                y: newY,
                width: 40 + Math.random() * 50,
                height: 15,
                color: platformColors[Math.floor(Math.random() * platformColors.length)]
            });
        }
        
        // 绘制
        function draw() {
            // 清空
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格背景
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 30) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 30) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // 绘制平台
            platforms.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.roundRect(p.x - p.width/2, p.y - p.height/2, p.width, p.height, 5);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // 绘制玩家
            ctx.fillStyle = player.color;
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // 兔子耳朵
            ctx.beginPath();
            ctx.arc(player.x - 8, player.y - 15, 8, 0, Math.PI * 2);
            ctx.arc(player.x + 8, player.y - 15, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 绘制蓄力条
            if (isPressing && !player.isJumping) {
                const barWidth = 60;
                const barHeight = 8;
                const barX = player.x - barWidth / 2;
                const barY = player.y + 35;
                
                // 背景
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(barX, barY, barWidth, barHeight);
                
                // 进度
                const gradient = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
                gradient.addColorStop(0, '#07c160');
                gradient.addColorStop(1, '#e74c3c');
                ctx.fillStyle = gradient;
                ctx.fillRect(barX, barY, barWidth * (power / player.maxPower), barHeight);
            }
        }
        
        // 更新
        function update() {
            if (!gameRunning) return;
            
            // 蓄力
            if (isPressing && !player.isJumping) {
                power += 2 * powerDirection;
                if (power >= player.maxPower) {
                    power = player.maxPower;
                    powerDirection = -1;
                } else if (power <= 0) {
                    power = 0;
                    powerDirection = 1;
                }
            }
            
            // 跳跃
            if (player.isJumping) {
                player.x += player.vx;
                player.y += player.vy;
                player.vy += 0.5; // 重力
                
                // 碰撞检测
                platforms.forEach(p => {
                    if (player.vy > 0 && // 向下落
                        player.y + player.radius >= p.y - p.height/2 &&
                        player.y + player.radius <= p.y + p.height/2 + 10 &&
                        player.x >= p.x - p.width/2 - player.radius &&
                        player.x <= p.x + p.width/2 + player.radius) {
                        
                        // 成功落到平台
                        player.isJumping = false;
                        player.y = p.y - player.radius;
                        player.vx = 0;
                        player.vy = 0;
                        
                        // 加分
                        const platformIndex = platforms.indexOf(p);
                        score = platformIndex;
                        updateScore();
                        
                        // 音效
                        playSound('land');
                        
                        // 添加新平台
                        if (platformIndex >= platforms.length - 5) {
                            addPlatform();
                        }
                    }
                });
                
                // 掉落检测
                if (player.y > canvas.height + 100) {
                    gameOver();
                }
            }
            
            draw();
            requestAnimationFrame(update);
        }
        
        // 开始跳跃
        function jump() {
            if (player.isJumping || !gameRunning) return;
            
            const angle = -Math.PI / 2; // 向上
            const force = power / player.maxPower * 15 + 5;
            
            player.vx = Math.sin(angle) * force * 0.3;
            player.vy = Math.cos(angle) * force;
            player.isJumping = true;
            
            playSound('jump');
        }
        
        // 更新分数
        function updateScore() {
            document.getElementById('scoreDisplay').textContent = score;
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('scoreDisplay').style.display = 'block';
            document.getElementById('soundBtn').style.display = 'block';
            
            score = 0;
            updateScore();
            
            initPlatforms();
            
            // 玩家初始位置
            const firstPlatform = platforms[0];
            player.x = firstPlatform.x;
            player.y = firstPlatform.y - player.radius;
            player.isJumping = false;
            power = 0;
            
            gameRunning = true;
            update();
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('endTitle').textContent = score > 50 ? '大神!' : (score > 20 ? '厉害!' : '继续加油!');
            document.getElementById('endScreen').style.display = 'flex';
        }
        
        // 重新开始
        function restartGame() {
            document.getElementById('endScreen').style.display = 'none';
            startGame();
        }
        
        // 分享
        function shareScore() {
            alert('分享到微信: 跳一跳 - 我得了' + score + '分！');
        }
        
        // 音效（使用Web Audio API）
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (type === 'jump') {
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                } else {
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                }
                
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }
        
        // 触摸事件
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && !player.isJumping) {
                isPressing = true;
                power = 0;
                powerDirection = 1;
            }
        });
        
        document.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (isPressing) {
                isPressing = false;
                jump();
            }
        });
        
        // 鼠标事件（PC调试用）
        document.addEventListener('mousedown', (e) => {
            if (gameRunning && !player.isJumping) {
                isPressing = true;
                power = 0;
                powerDirection = 1;
            }
        });
        
        document.addEventListener('mouseup', (e) => {
            if (isPressing) {
                isPressing = false;
                jump();
            }
        });
        
        // 初始绘制
        draw();
    </script>
</body>
</html>
